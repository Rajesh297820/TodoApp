<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Todo List App</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>My Todo List</h1>

<div class="input-section">

<input
type="text"
id="taskInput"
placeholder="Enter a new task">

<button id="addBtn">

Add Task

</button>

</div>

<div class="filter-buttons">

<button id="allBtn">

All

</button>

<button id="activeBtn">

Active

</button>

<button id="completedBtn">

Completed

</button>

</div>

<ul id="taskList">

</ul>

</div>

<script src="script.js"></script>

</body>

</html>
